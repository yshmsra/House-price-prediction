<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>house price predictor</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-dark">
    <!-- Main Content -->
    <div class="container">
        <div class = "row">
          <div class = "card" style="width:100%;height:100%;margin-top:50px">
            <div class="card-header" style="text-align:center">
              <h1> Welcome to house price predictor </h1>
            </div>

            <div class="card-body">
              <form method="post" accept-charset="utf-8">
                <div class="row">
                  <div class ="col-md-6 form-group" style="text-align:center">
                    <label><b> Select the location:</b></label>
                    <select class ="form-select" id="location" name="location" required="1">
                      {%for location in locations%}
                        <option value ="{{location}}">{{location}}</option>
                      {%endfor%}
                    </select>
                  </div>

                  <div class ="col-md-6 form-group" style="text-align:center">
                      <label><b> Enter BHK:</b></label>
                      <input type ="number" class="form-control" id="bhk" name="bhk" placeholder="Enter BHK" required>
                  </div>

                   <div class ="col-md-6 form-group" style="text-align:center">
                      <label><b> Enter no.of bathrooms:</b></label>
                      <input type ="number" class="form-control" id="bath" name="bath" placeholder="Enter no.of bathrooms" required>
                  </div>

                  <div class ="col-md-6 form-group" style="text-align:center">
                      <label><b> Enter Square Feet:</b></label>
                      <input type ="number" class="form-control" id="total_sqft" name="total_sqft" placeholder="Enter Square Feet" required>
                  </div>

                  <div class="col-md-12 form-group">
                    <button type="submit" class="btn btn-primary form-control">Predict Price</button>
                  </div> 

                </div>
              </form>
              
              <br>
              <div class="col-md-12" style="text-align:center">
                <h3><span id="prediction"></span></h3>
              </div>


            </div>
          </div>
        </div>
    </div>


    <script>
      const form = document.querySelector('form');
      const predictionSpan = document.getElementById("prediction");

      form.addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent normal form submission

        predictionSpan.innerHTML = "Wait, predicting the price......";

        const fd = new FormData(form);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/predict', true);

        xhr.onreadystatechange = function() {
          if (xhr.readyState === XMLHttpRequest.DONE) {
            if (xhr.status === 200) {
              predictionSpan.innerHTML = "prediction: ₹" + xhr.responseText;
            } else {
              predictionSpan.innerHTML = "Error: Prediction failed (status " + xhr.status + ")";
            }
          }
        };

        xhr.send(fd);
      });
    </script>

    <!-- Bootstrap JS and Popper.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
